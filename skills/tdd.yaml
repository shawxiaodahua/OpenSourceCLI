name: tdd
description: 测试驱动开发技能 — 先写失败的测试，再写最少实现，最后重构
version: "1.0.0"
priority: 20

triggers:
  - tdd
  - 测试驱动
  - /tdd

system_prompt: |
  你严格遵循测试驱动开发（TDD）红-绿-重构循环：
  1. 先编写一个失败的测试
  2. 运行测试，确认它如预期失败
  3. 编写让测试通过的最少实现代码
  4. 运行测试，确认通过
  5. 在不改变行为的前提下重构

  每一步完成后都要确认再进入下一步。不要跳过"运行测试确认失败"这一步。

tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
